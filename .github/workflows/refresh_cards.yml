name: Refresh Card Data

# Pulls the latest One Piece TCG card data from the punk-records dataset
# (generated by the vegapull scraper from Bandai's official card list),
# transforms it into all_cards.json, rebuilds index.html, and commits both.
#
# Self-contained on purpose: it rebuilds index.html itself rather than relying
# on the Build HTML workflow to pick up the all_cards.json change, because
# commits made with the default GITHUB_TOKEN do not trigger other workflows.

on:
  schedule:
    # Weekly, Monday 03:00 UTC (after most set updates land). Adjust as needed.
    - cron: '0 3 * * 1'
  workflow_dispatch:   # allow manual "Run workflow" from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone punk-records dataset (English)
        run: |
          git clone --depth 1 https://github.com/buhbbl/punk-records.git "${{ runner.temp }}/punk-records"
          echo "Cloned punk-records:"
          ls -la "${{ runner.temp }}/punk-records/english" || true

      - name: Transform to all_cards.json
        run: |
          python refresh_cards.py "${{ runner.temp }}/punk-records/english" all_cards.json

      - name: Rebuild index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python build_html.py template.html all_cards.json index.html

      - name: Commit updated data + build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_cards.json index.html
          if [[ -n "$(git status --porcelain all_cards.json index.html)" ]]; then
            git commit -m "chore: refresh card data from punk-records + rebuild [skip ci]"
            git push
            echo "Pushed refreshed card data and index.html"
          else
            echo "No card data changes this run"
          fi
