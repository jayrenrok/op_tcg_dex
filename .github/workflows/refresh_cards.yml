name: Refresh Card Data

# Pulls the latest One Piece TCG card data from the punk-records dataset
# (generated by the vegapull scraper from Bandai's official card list),
# transforms it into all_cards.json, rebuilds index.html, and commits both.
#
# Self-contained: rebuilds index.html itself because commits made with the
# default GITHUB_TOKEN do not trigger other workflows.

on:
  schedule:
    - cron: '0 3 * * 1'   # Weekly, Monday 03:00 UTC
  workflow_dispatch:        # Manual "Run workflow"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone punk-records dataset
        run: |
          git clone --depth 1 https://github.com/buhbbl/punk-records.git "${{ runner.temp }}/punk-records"

      - name: Show dataset layout (diagnostics)
        run: |
          echo "=== top level ==="
          ls -la "${{ runner.temp }}/punk-records" || true
          echo "=== english/ ==="
          ls -la "${{ runner.temp }}/punk-records/english" 2>/dev/null || echo "(no english/ dir)"
          echo "=== first 20 json files anywhere ==="
          find "${{ runner.temp }}/punk-records" -name '*.json' | head -20

      - name: Transform to all_cards.json
        run: |
          python refresh_cards.py "${{ runner.temp }}/punk-records" all_cards.json

      - name: Rebuild index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python build_html.py template.html all_cards.json index.html

      - name: Commit updated data + build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_cards.json index.html
          if [[ -n "$(git status --porcelain all_cards.json index.html)" ]]; then
            git commit -m "chore: refresh card data from punk-records + rebuild [skip ci]"
            git push
            echo "Pushed refreshed card data and index.html"
          else
            echo "No card data changes this run"
          fi
