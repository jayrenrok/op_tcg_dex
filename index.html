<script>
// === CONFIG ===
const PAGE_SIZE = 60;

// Image URL builders for each language. 
// IMPORTANT: Verify the 'sc' URL pattern if your SC images are hosted elsewhere.
const IMAGE_URLS = {
  en: (cardId) => `https://en.onepiece-cardgame.com/images/cardlist/card/${cardId}.png?240831`,
  jp: (cardId) => `https://www.onepiece-cardgame.com/images/cardlist/card/${cardId}.png?240831`,
  sc: (cardId) => `https://asia-sc.onepiece-cardgame.com/images/cardlist/card/${cardId}.png?240831` // UPDATE THIS if needed
};

// === STATE ===
let currentLang = localStorage.getItem('op_dex_lang') || 'en';
let filteredCards = [];
let visibleCount = 0;
let activeFilters = { color: new Set(), type: new Set(), rarity: new Set() };

// === DOM REFS ===
const grid = document.getElementById('grid');
const filterCount = document.getElementById('filter-count');
const totalCount = document.getElementById('total-count');
const searchInput = document.getElementById('search-input');
const filterPanel = document.getElementById('filter-panel');
const filterToggle = document.getElementById('filter-toggle');
const clearBtn = document.getElementById('clear-btn');
const loadMoreWrap = document.getElementById('load-more-wrap');
const remainingEl = document.getElementById('remaining');
const emptyEl = document.getElementById('empty');
const modal = document.getElementById('modal');
const modalId = document.getElementById('modal-id');
const modalBody = document.getElementById('modal-body');

// === LANGUAGE SWITCHER ===
function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('op_dex_lang', lang);
  
  // Update pill UI
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  
  // Reset pagination and re-render with new language images
  visibleCount = 0;
  renderPage();
}

function initLangSwitcher() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

// === IMAGE HELPERS ===
function getImageUrl(card) {
  // If your data ever has explicit per-language overrides, use them
  if (card.images && card.images[currentLang]) {
    return card.images[currentLang];
  }
  const builder = IMAGE_URLS[currentLang];
  return builder ? builder(card.id) : '';
}

function getSetColor(setNameOrCode) {
  const text = setNameOrCode || '';
  const match = text.match(/^(OP\d+|EB\d+|ST\d+|P)/i);
  const code = match ? match[1].toUpperCase() : 'OP';
  const colors = {
    'OP01':'#e94560','OP02':'#0f3460','OP03':'#533483','OP04':'#f39422',
    'OP05':'#16c79a','OP06':'#ef476f','OP07':'#118ab2','OP08':'#073b4c',
    'OP09':'#ffd166','OP10':'#06d6a0','OP11':'#fb8500','OP12':'#8338ec',
    'OP13':'#ff006e','OP14':'#3a86ff','OP15':'#06ffa5','EB01':'#ffbe0b',
    'EB02':'#ff006e','ST':'#8ac926','P':'#c77dff'
  };
  return colors[code] || '#555';
}

function getColorDot(color) {
  if (!color) return '#666';
  const c = color.toLowerCase();
  if (c.includes('red')) return '#ef4444';
  if (c.includes('green')) return '#22c55e';
  if (c.includes('blue')) return '#3b82f6';
  if (c.includes('purple')) return '#a855f7';
  if (c.includes('black')) return '#1f2937';
  if (c.includes('yellow')) return '#eab308';
  return '#666';
}

// === RENDERING ===
function createCardHTML(card) {
  const imgUrl = getImageUrl(card);
  const setColor = getSetColor(card.set?.name || card.code);
  
  return `
    <div class="card" onclick="openModal('${card.id}')">
      <div class="card-img-wrap">
        <img src="${imgUrl}" alt="${escapeHtml(card.name)}" loading="lazy" 
          onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').classList.add('show');">
        <div class="fallback" style="background:${setColor}">
          <div class="set-code">${escapeHtml(card.code)}</div>
          <div class="card-code">${escapeHtml(card.id)}</div>
        </div>
        ${card.rarity ? `<div class="rarity-badge">${escapeHtml(card.rarity)}</div>` : ''}
      </div>
      <div class="card-meta">
        <div class="id">${escapeHtml(card.code)}</div>
        <div class="name">${escapeHtml(card.name)}</div>
      </div>
    </div>
  `;
}

function renderPage() {
  const toShow = filteredCards.slice(0, visibleCount + PAGE_SIZE);
  visibleCount = toShow.length;
  
  if (toShow.length === 0) {
    grid.innerHTML = '';
    emptyEl.style.display = '';
    loadMoreWrap.style.display = 'none';
  } else {
    grid.innerHTML = toShow.map(createCardHTML).join('');
    emptyEl.style.display = 'none';
  }
  
  filterCount.textContent = filteredCards.length;
  totalCount.textContent = ALL_CARDS.length;
  
  const remaining = filteredCards.length - visibleCount;
  if (remaining > 0) {
    loadMoreWrap.style.display = '';
    remainingEl.textContent = remaining;
  } else {
    loadMoreWrap.style.display = 'none';
  }
}

function loadMore() {
  visibleCount += PAGE_SIZE;
  renderPage();
}

// === FILTERS ===
function toggleFilters() {
  filterPanel.classList.toggle('open');
  filterToggle.classList.toggle('active');
}

function clearFilters() {
  activeFilters = { color: new Set(), type: new Set(), rarity: new Set() };
  searchInput.value = '';
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active', 'color-active');
  });
  clearBtn.style.display = 'none';
  applyFilters();
}

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  
  filteredCards = ALL_CARDS.filter(card => {
    if (query) {
      const haystack = `${card.name} ${card.code} ${card.id} ${card.type} ${card.rarity} ${card.color}`.toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    
    if (activeFilters.color.size > 0) {
      const cardColor = (card.color || '').toLowerCase();
      const has = Array.from(activeFilters.color).some(c => cardColor.includes(c.toLowerCase()));
      if (!has) return false;
    }
    
    if (activeFilters.type.size > 0) {
      if (!activeFilters.type.has(card.type)) return false;
    }
    
    if (activeFilters.rarity.size > 0) {
      if (!activeFilters.rarity.has(card.rarity)) return false;
    }
    
    return true;
  });
  
  visibleCount = 0;
  renderPage();
  
  const hasActive = activeFilters.color.size + activeFilters.type.size + activeFilters.rarity.size > 0 || query;
  clearBtn.style.display = hasActive ? '' : 'none';
}

function makePill(text, group, containerId) {
  const pill = document.createElement('button');
  pill.className = 'pill';
  pill.textContent = text;
  
  if (group === 'color') {
    const dot = document.createElement('span');
    dot.className = 'dot';
    const map = {
      'red':'#ef4444','green':'#22c55e','blue':'#3b82f6',
      'purple':'#a855f7','black':'#1f2937','yellow':'#eab308',
      'red/green':'linear-gradient(135deg,#ef4444 50%,#22c55e 50%)'
    };
    dot.style.background = map[text.toLowerCase()] || '#666';
    pill.prepend(dot);
  }
  
  pill.onclick = () => {
    const set = activeFilters[group];
    if (set.has(text)) {
      set.delete(text);
      pill.classList.remove('active');
      if (group === 'color') pill.classList.remove('color-active');
    } else {
      set.add(text);
      pill.classList.add('.add('active');
      if (group === 'color') pill.classList.add('color-active');
    }
    applyFilters();
  };
  
  document.getElementById(containerId).appendChild(pill);
}

function initFilters() {
  const colors = new Set(), types = new Set(), rarities = new Set();
  
  ALL_CARDS.forEach(c => {
    if (c.color) c.color.split('/').forEach(x => colors.add(x.trim()));
    if (c.type) types.add(c.type);
    if (c.rarity) rarities.add(c.rarity);
  });
  
  Array.from(colors).sort().forEach(c => makePill(c, 'color', 'color-pills'));
  Array.from(types).sort().forEach(t => makePill(t, 'type', 'type-pills'));
  Array.from(rarities).sort().forEach(r => makePill(r, 'rarity', 'rarity-pills'));
}

// === MODAL ===
function openModal(cardId) {
  const card = ALL_CARDS.find(c => c.id === cardId);
  if (!card) return;
  
  modalId.textContent = `${card.code} · ${card.rarity || '-'} · ${card.type || '-'}`;
  
  const imgUrl = getImageUrl(card);
  const setColor = getSetColor(card.set?.name || card.code);
  
  modalBody.innerHTML = `
    <div class="modal-img">
      <img src="${imgUrl}" alt="${escapeHtml(card.name)}" 
        onerror="this.style.display='none'; this.parentElement.style.background='${setColor}'; this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;\\'><div style=\\'font-family:Bebas Neue,sans-serif;font-size:40px;\\'>${card.code}</div><div style=\\'font-size:14px;margin-top:8px;\\'>${card.id}</div></div>';">
    </div>
    <div class="modal-name">${escapeHtml(card.name)}</div>
    <div class="modal-family">${escapeHtml(card.family || '')}</div>
    <div class="stat-row">
      <div class="stat-cell"><div class="lbl">Cost</div><div class="val">${card.cost ?? '-'}</div></div>
      <div class="stat-cell"><div class="lbl">Power</div><div class="val">${card.power ?? '-'}</div></div>
      <div class="stat-cell"><div class="lbl">Counter</div><div class="val">${card.counter ?? '-'}</div></div>
    </div>
    <div class="info-row"><div class="info-lbl">Color</div><div class="info-val"><span class="color-tag"><span class="dot" style="background:${getColorDot(card.color)}"></span>${escapeHtml(card.color || '-')}</span></div></div>
    <div class="info-row"><div class="info-lbl">Set</div><div class="info-val">${escapeHtml(card.set?.name || '-')}</div></div>
    ${card.ability ? `<div class="ability-box"><div class="ability-lbl">Ability</div><div class="ability-text">${card.ability}</div></div>` : ''}
  `;
  
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== modal && !e.target.closest('.modal-backdrop-area')) return; // allow clicking overlay only
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

// === UTILS ===
function escapeHtml(text) {
  if (text == null) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// === INIT ===
searchInput.addEventListener('input', applyFilters);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

initLangSwitcher();
initFilters();
applyFilters();
</script>
