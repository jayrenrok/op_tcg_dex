<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>One Piece DEX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: radial-gradient(ellipse at top, #1a1f2e 0%, #0a0d14 50%, #050709 100%);
  color: #FAF7F2;
  min-height: 100vh;
  position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
.editorial { font-family: 'Fraunces', serif; font-style: italic; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a3142; border-radius: 3px; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

header {
  position: sticky; top: 0; z-index: 20;
  background: rgba(10,13,20,0.85);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(245,158,11,0.15);
}
.header-inner { max-width: 1200px; margin: 0 auto; padding: 16px 16px 12px; }
.brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
.brand { display: flex; align-items: center; gap: 8px; }
.brand .anchor { width: 20px; height: 20px; color: #F59E0B; }
.brand h1 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.04em; line-height: 1; }
.brand h1 .accent { color: #F59E0B; }
.brand .subtitle { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: #8B92A8; margin-top: 2px; }
.data-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: rgba(34,197,94,0.15); color: #4ADE80;
  border: 1px solid rgba(34,197,94,0.3);
}
.lang-switcher {
  display: inline-flex; gap: 2px; padding: 3px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
}
.lang-btn {
  padding: 5px 12px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  color: #8B92A8;
  transition: all 0.2s;
  white-space: nowrap;
}
.lang-btn.active {
  background: rgba(245,158,11,0.18);
  color: #F59E0B;
  box-shadow: 0 0 0 1px rgba(245,158,11,0.3);
}
.lang-btn:not(.active):hover { color: #FAF7F2; }
.data-badge .pulse {
  width: 6px; height: 6px; border-radius: 50%; background: #4ADE80;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 50% { opacity: 0.4; } }

.search-row { display: flex; gap: 8px; }
.search-wrap { flex: 1; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #8B92A8; pointer-events: none; }
.search-input {
  width: 100%; padding: 10px 12px 10px 36px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: #FAF7F2; font-size: 14px; outline: none;
}
.search-input:focus { border-color: rgba(245,158,11,0.4); }
.filter-btn {
  padding: 0 14px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #FAF7F2;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.filter-btn.active { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: #F59E0B; }
.filter-btn svg { width: 18px; height: 18px; }

.filter-panel {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: none;
  animation: fadeIn 0.3s ease-out;
}
.filter-panel.open { display: block; }
.filter-group { margin-bottom: 12px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: #8B92A8; margin-bottom: 6px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  padding: 4px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500;
  background: rgba(255,255,255,0.04); color: #FAF7F2;
  border: 1px solid rgba(255,255,255,0.08);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.pill .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.2); }
.pill.active { background: rgba(245,158,11,0.2); color: #F59E0B; border-color: rgba(245,158,11,0.5); }
.pill.color-active { color: #fff; }
.clear-btn {
  display: inline-flex; align-items: center; gap: 4px;
  color: #F59E0B; font-size: 12px; margin-top: 4px;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.stats {
  max-width: 1200px; margin: 0 auto; padding: 16px 16px 8px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.stats .count { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: #8B92A8; }
.stats .count .big { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #F59E0B; margin-right: 6px; }
.stats .note { font-family: 'Fraunces', serif; font-style: italic; font-size: 11px; color: #8B92A8; }

main { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; position: relative; z-index: 2; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
@media (min-width: 540px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; } }
@media (min-width: 768px) { .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
@media (min-width: 1024px) { .grid { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
.card { min-width: 0; } /* allow the grid item to shrink below content size */

.card {
  text-align: left; animation: fadeIn 0.4s ease-out;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  width: 100%;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(245,158,11,0.25); }
.card-img-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 139.86%; /* 1/0.715 — locks aspect ratio even if image fails */
  border-radius: 8px; overflow: hidden;
  background: #141A29;
  border: 1px solid rgba(255,255,255,0.06);
}
.card-img-wrap > * { position: absolute; inset: 0; }
.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
  background: #141A29;
}
.fallback {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 8px; text-align: center;
}
.fallback.show { display: flex; }
.fallback .set-code { font-family: 'Bebas Neue', sans-serif; font-size: 32px; }
.fallback .card-code { font-size: 10px; color: #8B92A8; margin-top: 4px; }
.rarity-badge {
  position: absolute !important; inset: auto !important;
  top: 6px; right: 6px;
  padding: 2px 6px; border-radius: 4px;
  font-size: 9px; font-weight: 700;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  width: auto; height: auto;
}
.card-meta { padding: 6px 2px 0; }
.card-meta .id { font-family: monospace; font-size: 10px; color: #8B92A8; }
.card-meta .name { font-size: 12px; font-weight: 600; color: #FAF7F2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.empty { text-align: center; padding: 80px 16px; }
.empty .sparkle { width: 32px; height: 32px; color: #8B92A8; margin: 0 auto 12px; }
.empty .title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
.empty .sub { font-size: 14px; color: #8B92A8; margin-top: 4px; }

.load-more-wrap {
  text-align: center; padding: 24px 0;
}
.load-more-btn {
  padding: 10px 24px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  background: rgba(245,158,11,0.12); color: #F59E0B;
  border: 1px solid rgba(245,158,11,0.3);
  text-transform: uppercase; letter-spacing: 0.15em;
  transition: all 0.2s;
}
.load-more-btn:hover { background: rgba(245,158,11,0.2); }

.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
@media (min-width: 640px) { .modal-overlay { align-items: center; padding: 24px; } }
.modal-overlay.open { display: flex; }
.modal {
  width: 100%; max-width: 480px; max-height: 92vh;
  overflow-y: auto; border-radius: 24px 24px 0 0;
  background: linear-gradient(180deg, #141A29 0%, #0a0d14 100%);
  animation: fadeIn 0.3s ease-out;
}
@media (min-width: 640px) { .modal { border-radius: 24px; } }
.modal-header {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: rgba(20,26,41,0.85);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
.back-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; }
.back-btn svg { width: 16px; height: 16px; }
.modal-id { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: #8B92A8; }
.modal-body { padding: 20px; }
.modal-img {
  border-radius: 12px; overflow: hidden;
  margin-bottom: 16px;
  position: relative;
  padding-bottom: 139.86%;
}
.modal-img img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; object-fit: cover; }
.modal-name { font-family: 'Bebas Neue', sans-serif; font-size: 30px; line-height: 1; }
.modal-family { font-size: 12px; color: #8B92A8; margin-top: 4px; margin-bottom: 16px; }
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-cell {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 10px; text-align: center;
}
.stat-cell .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: #8B92A8; margin-bottom: 2px; }
.stat-cell .val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
.info-row {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.info-row .info-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: #8B92A8; flex-shrink: 0; }
.info-row .info-val { font-size: 12px; color: #FAF7F2; text-align: right; }
.color-tag { display: inline-flex; align-items: center; gap: 4px; }
.color-tag .dot { width: 10px; height: 10px; border-radius: 50%; }
.ability-box {
  margin-top: 16px; padding: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
}
.ability-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: #F59E0B; margin-bottom: 6px; }
.ability-text { font-size: 13px; line-height: 1.5; color: #E5E0D8; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-row">
      <div class="brand">
        <svg class="anchor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><path d="M12 22V8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
        <div>
          <h1>ONE PIECE <span class="accent">DEX</span></h1>
          <div class="subtitle">Card Database · v2</div>
        </div>
      </div>
      <div class="lang-switcher" id="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="jp" onclick="setLang('jp')">日本語</button>
        <button class="lang-btn" data-lang="sc" onclick="setLang('sc')">简中</button>
      </div>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" class="search-input" type="text" placeholder="Search by name or card ID (e.g. OP01-001)" autocomplete="off" />
      </div>
      <button class="filter-btn" id="filter-toggle" onclick="toggleFilters()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
      </button>
    </div>

    <div class="filter-panel" id="filter-panel">
      <div class="filter-group">
        <div class="filter-label">Color</div>
        <div class="pill-row" id="color-pills"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Type</div>
        <div class="pill-row" id="type-pills"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Rarity</div>
        <div class="pill-row" id="rarity-pills"></div>
      </div>
      <button class="clear-btn" onclick="clearFilters()" id="clear-btn" style="display:none">
        ✕ Clear all filters
      </button>
    </div>
  </div>
</header>

<div class="stats">
  <div class="count"><span class="big" id="filter-count">0</span>/ <span id="total-count">0</span> cards</div>
  <div class="note" id="data-note">tap a card for full detail</div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" onclick="loadMore()">Load more (<span id="remaining">0</span> remaining)</button>
  </div>
  <div class="empty" id="empty" style="display:none">
    <svg class="sparkle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3L12 3z"/></svg>
    <div class="title">NO CARDS FOUND</div>
    <div class="sub">Try adjusting your filters.</div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button class="back-btn" onclick="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="modal-id" id="modal-id"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
